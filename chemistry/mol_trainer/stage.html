<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>トレーニング｜mol Trainer</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="top-nav"><div class="top-nav-inner"><a class="brand" href="index.html">← トップページに戻る</a><span class="progress-mini">5問トレーニング</span></div></nav>
  <main class="quiz-shell">
    <div class="quiz-header"><div><p id="stage-label" class="eyebrow"></p><h1 id="stage-title" style="font-size:clamp(1.7rem,6vw,2.6rem);margin-bottom:4px"></h1></div><p id="counter"></p></div>
    <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
    <section id="quiz-card" class="quiz-card">
      <div id="question-area">
        <div id="question-label" class="question-label"></div>
        <div id="question-text" class="question-text"></div>
        <div id="choices" class="choice-list"></div>
        <div id="feedback" class="feedback"></div>
        <div id="explanation" class="explanation"></div>
        <div class="next-row"><button id="next-button" class="primary-button hidden">次の問題へ</button></div>
      </div>
      <div id="result-area" class="result-box hidden">
        <p class="eyebrow">RESULT</p><h2 id="result-title"></h2><div id="score-circle" class="score-circle"></div><p id="result-message"></p>
        <div class="result-actions"><button id="retry-button" class="secondary-button">もう一度</button><a class="secondary-button" href="index.html">一覧へ</a><a id="next-stage-link" class="primary-button" href="#">次へ</a></div>
      </div>
    </section>
  </main>
  <script src="js/tracking.js"></script>
  <script src="js/stages.js"></script>
  <script src="js/question_banks.js"></script>
  <script src="js/stage.js"></script>
</body>
</html>
