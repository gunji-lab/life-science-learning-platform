<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mol Trainer</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">生命科学のための計算トレーニング</p>
        <h1>mol Trainer</h1>
        <p class="lead">5分ノートで要点を確認し、「はじめる前に」から「実践③」まで段階的に練習します。</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card hero-card">
      <div>
        <span class="pill">おすすめ</span>
        <h2>まずは5分の勉強ノート</h2>
        <p>molの意味、モル質量、質量との変換を図と文章で確認します。最後に確認問題が3問あります。</p>
      </div>
      <a class="primary-button" href="study.html">勉強ノートを読む</a>
    </section>

    <section>
      <div class="section-heading">
        <div>
          <p class="eyebrow">Practice</p>
          <h2>基礎・実践トレーニング</h2>
        </div>
        <p>準備 → 基礎 → 実践の順に進みます。各区分は5問、4問以上正解でクリアです。</p>
      </div>
      <div id="stage-grid" class="stage-grid"></div>
    </section>
  </main>

  <footer>mol Trainer v1.0.0</footer>
  <script src="js/stages.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
